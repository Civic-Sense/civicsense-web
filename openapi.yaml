openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CivicSense API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: community
    description: Community interest submissions
  - name: reports
    description: Video/incident report submissions
  - name: Storage
    description: Object storage upload and serving endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /community/join:
    post:
      operationId: joinCommunity
      tags: [community]
      summary: Submit community interest
      description: Submit name and contact to express interest in joining the community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityJoinInput"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityJoinResponse"
        "400":
          description: Invalid input
  /community/submissions:
    get:
      operationId: listSubmissions
      tags: [community]
      summary: List all community interest submissions
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunitySubmission"
  /reports:
    post:
      operationId: createReport
      tags: [reports]
      summary: Submit a video/incident report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "400":
          description: Invalid input
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CommunityJoinInput:
      type: object
      required:
        - name
        - contact
      properties:
        name:
          type: string
          minLength: 1
        contact:
          type: string
          minLength: 1
        message:
          type: ["string", "null"]
    CommunityJoinResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string
    CommunitySubmission:
      type: object
      required:
        - id
        - name
        - contact
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        contact:
          type: string
        message:
          type: ["string", "null"]
        createdAt:
          type: string
    ReportInput:
      type: object
      required:
        - submitterName
        - submitterContact
        - description
        - objectPath
        - fileName
      properties:
        submitterName:
          type: string
          minLength: 1
        submitterContact:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        location:
          type: ["string", "null"]
        objectPath:
          type: string
          minLength: 1
        fileName:
          type: string
          minLength: 1
    ReportResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
